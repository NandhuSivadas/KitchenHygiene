{% extends "User/Header.html" %}

{% block title %}Edit Profile - RateMyKitchen{% endblock %}

{% block extra_styles %}
<style>
  .edit-profile-container {
    max-width: 700px;
    margin: 3rem auto;
    padding: 0 1rem;
  }

  .edit-profile-card {
    background: white;
    border-radius: 24px;
    padding: 3rem;
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
    border: 1px solid rgba(201, 169, 97, 0.1);
  }

  .form-header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .form-title {
    font-size: 2.5rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--dark), var(--primary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.5rem;
  }

  .form-group {
    margin-bottom: 1.75rem;
  }

  .form-label {
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 0.5rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .form-label i {
    color: var(--primary);
  }

  .form-control {
    width: 100%;
    padding: 0.875rem 1.25rem;
    border: 2px solid rgba(0, 0, 0, 0.1);
    border-radius: 12px;
    font-size: 1rem;
    transition: all 0.3s ease;
    font-family: 'Inter', sans-serif;
  }

  .form-control:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(201, 169, 97, 0.1);
  }

  textarea.form-control {
    resize: vertical;
    min-height: 100px;
  }

  .btn-save {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: white;
    border: none;
    padding: 1rem 2rem;
    border-radius: 12px;
    font-weight: 600;
    font-size: 1.05rem;
    transition: all 0.3s ease;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
  }

  .btn-save:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(201, 169, 97, 0.3);
  }

  .btn-cancel {
    background: white;
    border: 2px solid var(--primary);
    color: var(--primary);
    padding: 1rem 2rem;
    border-radius: 12px;
    font-weight: 600;
    font-size: 1.05rem;
    transition: all 0.3s ease;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    cursor: pointer;
  }

  .btn-cancel:hover {
    background: var(--primary);
    color: white;
  }

  .alert {
    padding: 1rem 1.25rem;
    border-radius: 12px;
    margin-bottom: 1.5rem;
    border: none;
  }

  .alert-success {
    background: rgba(16, 185, 129, 0.1);
    color: var(--success);
  }

  .alert-danger {
    background: rgba(239, 68, 68, 0.1);
    color: var(--danger);
  }
</style>
{% endblock %}

{% block content %}
<div class="edit-profile-container">
  <div class="edit-profile-card" data-aos="fade-up">
    <div class="form-header">
      <h1 class="form-title">Edit My Profile</h1>
    </div>

    <!-- Messages -->
    {% if messages %}
    {% for message in messages %}
    <div class="alert alert-{{ message.tags }}">
      {{ message }}
    </div>
    {% endfor %}
    {% endif %}

    <form method="POST">
      {% csrf_token %}

      <div class="form-group">
        <label for="txt_name" class="form-label">
          <i class="fas fa-hotel"></i> Hotel Name
        </label>
        <input type="text" class="form-control" id="txt_name" name="txt_name" value="{{ user.hotel_name }}" required>
      </div>

      <div class="form-group">
        <label for="txt_email" class="form-label">
          <i class="fas fa-envelope"></i> Email
        </label>
        <input type="email" class="form-control" id="txt_email" name="txt_email" value="{{ user.hotel_email }}"
          required>
      </div>

      <div class="form-group">
        <label for="txt_contact" class="form-label">
          <i class="fas fa-phone"></i> Contact
        </label>
        <input type="text" class="form-control" id="txt_contact" name="txt_contact" value="{{ user.hotel_contact }}"
          required>
      </div>

      <div class="form-group">
        <label for="txt_address" class="form-label">
          <i class="fas fa-map-marker-alt"></i> Address
        </label>
        <textarea class="form-control" id="txt_address" name="txt_address" rows="3"
          required>{{ user.hotel_address }}</textarea>
      </div>

      <div class="text-center mt-4">
        <button type="submit" class="btn-save">
          <i class="fas fa-save"></i> Save Changes
        </button>
        <a href="{% url 'webuser:myprofile' %}" class="btn-cancel ms-2">
          <i class="fas fa-times"></i> Cancel
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
