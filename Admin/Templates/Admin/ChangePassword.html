{% extends "Admin/Header.html" %}
{% block title %}Change Password | Kitchen AI{% endblock %}
{% block page_title %}Security{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="section-glass">
            <h4 class="section-title mb-4">Change Password</h4>

            {% if error %}
            <div class="alert alert-danger rounded-3 border-0 mb-4">
                <i class="fas fa-exclamation-circle me-2"></i> {{ error }}
            </div>
            {% endif %}

            <form method="POST">{% csrf_token %}
                <div class="mb-3">
                    <label class="form-label text-muted fw-bold small text-uppercase">Current Password</label>
                    <input type="password" name="txt_currentpassword" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label text-muted fw-bold small text-uppercase">New Password</label>
                    <input type="password" name="txt_newpassword" class="form-control" required>
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted fw-bold small text-uppercase">Confirm New Password</label>
                    <input type="password" name="txt_confirmpassword" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-warning w-100 rounded-pill fw-bold">Update Password</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
